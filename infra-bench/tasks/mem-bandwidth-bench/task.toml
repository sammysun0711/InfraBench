schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/mem-bandwidth-bench"
description = "Write and run a HIP microbenchmark to measure the achievable HBM memory bandwidth of an AMD MI35X (CDNA4/gfx950) GPU, reporting a physically-plausible number backed by real on-GPU kernel execution."
keywords = ["rocm", "amd", "mi350", "cdna4", "hip", "memory-bandwidth", "microbenchmark", "profiling"]
[[task.authors]]
name = "xisun"

[metadata]
author_name = "xisun"
difficulty = "medium"
category = "profiling-analysis"
tags = ["rocm", "amd", "hip", "bandwidth", "microbenchmark"]

# Verifier compiles+runs the agent's benchmark under rocprofv3 (~2-3 min).
[verifier]
timeout_sec = 1200.0

[agent]
timeout_sec = 3600.0

[environment]
build_timeout_sec = 1800.0
cpus = 8
memory_mb = 32768
# GPU access comes from environment/docker-compose.yaml, not harbor's allocator.
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
