schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/engram-triton-kernel"
description = "Reimplement DeepSeek's Engram gate forward operator as a Triton kernel on AMD MI350, matching the PyTorch and TileLang references numerically and beating the TileLang kernel's latency by >=60%."
keywords = ["rocm", "amd", "mi350", "triton", "kernel-implementation", "engram", "deepseek", "tilelang"]
[[task.authors]]
name = "xisun"

[metadata]
author_name = "xisun"
difficulty = "hard"
category = "kernel-implementation"
tags = ["rocm", "amd", "triton", "kernel", "engram"]

# Verifier: correctness vs 2 references + timed speedup (~3-5 min).
[verifier]
timeout_sec = 1800.0

[agent]
timeout_sec = 5400.0

[environment]
# Image build compiles tilelang from source for ROCm — allow generous build time.
build_timeout_sec = 3600.0
cpus = 16
memory_mb = 65536
# GPU access comes from environment/docker-compose.yaml, not harbor's allocator.
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
