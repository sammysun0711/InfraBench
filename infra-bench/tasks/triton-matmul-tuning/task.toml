schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/triton-matmul-tuning"
description = "Restore and tune the ROCm autotune configuration for Triton's tutorial matrix-multiplication kernel on AMD MI350X/gfx950, improving a weak hidden baseline while preserving correctness."
keywords = ["rocm", "amd", "mi350", "gfx950", "triton", "matmul", "gemm", "kernel-tuning", "autotune"]
[[task.authors]]
name = "toqiu"

[metadata]
author_name = "toqiu"
difficulty = "medium"
category = "kernel-tuning"
tags = ["rocm", "amd", "triton", "matmul", "gemm", "tuning"]

# Verifier: static config checks + correctness + timed speedup vs a hidden
# weak HIP baseline.
[verifier]
timeout_sec = 1800.0

[agent]
timeout_sec = 3600.0

[environment]
build_timeout_sec = 1800.0
cpus = 8
memory_mb = 65536
# GPU access comes from environment/docker-compose.yaml, not harbor's allocator.
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
