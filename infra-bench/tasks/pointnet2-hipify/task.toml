schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/pointnet2-hipify"
description = "Port the PointNet++ pointnet2_ops custom CUDA extension to build and run correctly on an AMD MI350 GPU (ROCm/HIP), verified by op-level and end-to-end numerical checks against reference outputs."
keywords = ["rocm", "amd", "mi350", "hipify", "cuda", "hip", "custom-ops", "porting", "pytorch-extension"]
[[task.authors]]
name = "xisun"

[metadata]
author_name = "xisun"
difficulty = "medium"
category = "debug-triage"
tags = ["rocm", "amd", "hipify", "cuda-to-hip", "build"]

# Verifier builds the extension (JIT compile of 5 kernels, ~3-5 min) + numerics.
[verifier]
timeout_sec = 1800.0

[agent]
timeout_sec = 3600.0

[environment]
build_timeout_sec = 2400.0
cpus = 8
memory_mb = 32768
# GPU access comes from environment/docker-compose.yaml, not harbor's allocator.
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
