schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/ck-a16w16-gemm-tuning-gemma4"
description = "Tune aiter's a16w16 (bf16) GEMM kernels on MI350 for the real GEMM shapes of gemma-4-26B-A4B, producing a tuned config that beats the default kernel selection while preserving numerical correctness."
keywords = ["rocm", "amd", "mi350", "aiter", "gemm", "kernel-tuning", "bf16", "gemma4"]
[[task.authors]]
name = "xisun"

[metadata]
author_name = "xisun"
difficulty = "hard"
category = "kernel-tuning"
tags = ["rocm", "amd", "aiter", "gemm", "tuning"]

# Verifier is benchmark-only (no re-tune): times default vs agent config (~3-5 min).
[verifier]
timeout_sec = 1800.0

# Agent tunes 11 shapes with triton,opus (~37s/shape ≈ 7 min); allow headroom
# for exploration/JIT builds.
[agent]
timeout_sec = 2700.0

[environment]
build_timeout_sec = 2400.0
cpus = 8
memory_mb = 65536
# GPU access comes from environment/docker-compose.yaml, not harbor's allocator.
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
