schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/gemma4-sglang-serving-opt"
description = "Optimize sglang serving of the gemma-4-26B-A4B MoE model on MI350: diagnose the triton MoE fallback and enable the aiter CK fused-MoE path, improving throughput and TTFT while preserving GSM8K accuracy."
keywords = ["rocm", "amd", "mi350", "sglang", "moe", "aiter", "inference", "serving", "optimization"]
[[task.authors]]
name = "xisun"

[metadata]
author_name = "xisun"
difficulty = "hard"
category = "model-deployment"
tags = ["rocm", "amd", "sglang", "moe", "serving-optimization"]

# Verifier measures BOTH a pristine baseline and the agent's version end-to-end
# (server launch + long-context bench + gsm8k), ~10 min each → ~20+ min total.
[verifier]
timeout_sec = 2400.0

[agent]
timeout_sec = 3600.0

[environment]
build_timeout_sec = 2400.0
cpus = 8
memory_mb = 65536
# GPU access comes from environment/docker-compose.yaml (device passthrough +
# GPU-pool allocator), NOT harbor's allocator (which only knows nvidia-docker).
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
