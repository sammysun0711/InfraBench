schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/hotspot-analysis-torch-profiler"
description = "Profile a fixed sglang inference workload (gemma-4-26B-A4B, 8K input / 5 output / concurrency 1) on MI350 with the torch profiler and identify the single most time-consuming GPU kernel."
keywords = ["rocm", "amd", "mi350", "profiling", "torch-profiler", "sglang", "moe", "performance-analysis"]
[[task.authors]]
name = "Xiake Sun"
email = "xiake.sun@amd.com"

[metadata]
author_name = "Xiake Sun"
email = "xiake.sun@amd.com"
difficulty = "medium"
category = "profiling-analysis"
tags = ["rocm", "amd", "profiling", "sglang"]

# Verifier launches the server + profiles the fixed workload + parses (~5-8 min).
[verifier]
timeout_sec = 1800.0

[agent]
timeout_sec = 3600.0

[environment]
build_timeout_sec = 2400.0
cpus = 8
memory_mb = 65536
# GPU access comes from environment/docker-compose.yaml, not harbor's allocator.
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
