# Overrides harbor's base `main` service with AMD GPU passthrough + the GPU-pool
# allocator. No model mount — GEMM tuning uses synthetic tensors.
services:
  main:
    devices:
      - "/dev/kfd"
      - "/dev/dri"
    group_add:
      - "video"
    security_opt:
      - "seccomp=unconfined"
    cap_add:
      - "SYS_PTRACE"
    ipc: host
    environment:
      INFRABENCH_GPU_POOL: /gpu_pool
      INFRABENCH_GPU_COUNT: "${INFRABENCH_GPU_COUNT:-8}"
    volumes:
      - "${INFRABENCH_GPU_POOL_HOST:-/tmp/infrabench_gpu_pool}:/gpu_pool"
    command: ["/infrabench/claim_gpu.sh"]
