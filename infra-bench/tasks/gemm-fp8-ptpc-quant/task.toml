schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/gemm-fp8-ptpc-quant"
description = "Convert a Gluon split-K FP8 GEMM kernel on AMD MI350 from block-wise weight quantization ([N//128, K//128] scale applied per-K-block) to per-token / PTPC weight quantization ([N, 1] per-output-channel scale applied once after K accumulation), matching a torch reference and clearing an efficiency floor vs a frozen Gluon reference."
keywords = ["rocm", "amd", "mi350", "triton", "gluon", "gemm", "fp8", "quantization", "ptpc", "per-token", "kernel-implementation"]
[[task.authors]]
name = "toqiu"

[metadata]
author_name = "toqiu"
difficulty = "hard"
category = "kernel-implementation"
tags = ["rocm", "amd", "triton", "gluon", "gemm", "fp8", "ptpc"]

# Verifier: correctness on fresh PTPC data (several shapes) + timed efficiency
# floor vs the frozen reference kernel (~2-4 min).
[verifier]
timeout_sec = 1800.0

[agent]
timeout_sec = 5400.0

[environment]
build_timeout_sec = 1800.0
cpus = 16
memory_mb = 65536
# GPU access comes from environment/docker-compose.yaml, not harbor's allocator.
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
