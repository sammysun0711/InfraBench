schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/gluon-a8w8-mfma-att"
description = "Profile a high-performance a8w8 (FP8) Gluon GEMM kernel on MI350 with rocprofv3 Advanced Thread Trace, decode the trace, and compute a realistic MFMA (matrix-core) utilization number, matching the ROCm gfx950-gluon-tutorials methodology."
keywords = ["rocm", "amd", "mi350", "gfx950", "gluon", "triton", "rocprofv3", "att", "thread-trace", "mfma", "profiling", "gemm", "fp8"]
[[task.authors]]
name = "xisun"

[metadata]
author_name = "xisun"
difficulty = "hard"
category = "profiling-analysis"
tags = ["rocm", "amd", "gfx950", "gluon", "att", "mfma", "profiling"]

[verifier]
# Re-decodes the agent's ATT trace with the trusted analyzer (fast).
timeout_sec = 900.0

[agent]
# Agent profiles under ATT (a few min) then decodes/analyzes.
timeout_sec = 3600.0

[environment]
# Image build clones + builds Triton from source (gfx950-tutorial-v1.1 tag) and
# installs the ATT decoder — a long compile, so allow plenty of headroom.
build_timeout_sec = 7200.0
cpus = 8
memory_mb = 65536
# GPU access comes from environment/docker-compose.yaml (device passthrough +
# GPU-pool allocator), NOT harbor's allocator (which only knows nvidia-docker).
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
