schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/llm-fp8-quantize"
description = "Quantize the dense hybrid Qwen3.5-27B model to FP8 and serve it with sglang on MI350 so that it is at least 10% faster than BF16 on a long-context workload while keeping GSM8K accuracy within 3 points."
keywords = ["rocm", "amd", "mi350", "sglang", "fp8", "quantization", "llm-compressor", "inference", "serving"]
[[task.authors]]
name = "xisun"

[metadata]
author_name = "xisun"
difficulty = "hard"
category = "model-deployment"
tags = ["rocm", "amd", "sglang", "fp8", "quantization"]

# Verifier serves BOTH the BF16 baseline and the agent's FP8 model end-to-end
# (each: server launch + long-context bench + gsm8k), ~10-12 min each → ~25 min.
[verifier]
timeout_sec = 2400.0

[agent]
# Agent must install a quantizer, quantize (~5 min), then iterate on serving.
timeout_sec = 5400.0

[environment]
build_timeout_sec = 2400.0
cpus = 8
memory_mb = 131072
# GPU access comes from environment/docker-compose.yaml (device passthrough +
# GPU-pool allocator), NOT harbor's allocator (which only knows nvidia-docker).
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
