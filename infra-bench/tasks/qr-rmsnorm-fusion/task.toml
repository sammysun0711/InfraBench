schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/qr-rmsnorm-fusion"
description = "Fuse a communication op (quick all-reduce, custom two-shot IPC) with a memory-bound op (add-residual + RMSNorm) into one HIP kernel on 2x MI350, matching a torch reference and beating the unfused (all-reduce + rmsnorm) baseline. Based on aiter PR #4104."
keywords = ["rocm", "amd", "mi350", "gfx950", "aiter", "kernel-fusion", "all-reduce", "quick-reduce", "rmsnorm", "multi-gpu", "hip", "collective"]
[[task.authors]]
name = "xisun"

[metadata]
author_name = "xisun"
difficulty = "hard"
category = "kernel-implementation"
tags = ["rocm", "amd", "gfx950", "aiter", "fusion", "multi-gpu"]

[verifier]
# Rebuild the agent's kernel + 2-GPU accuracy test + two rocprofv3 profile runs.
timeout_sec = 2400.0

[agent]
timeout_sec = 7200.0

[environment]
# Image build clones aiter@PR + pip install (JIT kernels compile at test time).
build_timeout_sec = 2400.0
cpus = 16
memory_mb = 131072
# GPU access comes from environment/docker-compose.yaml. This task needs TWO GPUs
# (quick all-reduce across 2 ranks); the compose sets INFRABENCH_GPU_CLAIM=2 and
# the pool allocator claims two cards. gpus=0 keeps harbor's nvidia-only allocator
# out of it.
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
