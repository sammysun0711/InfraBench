schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/vllm-aiter-debug"
description = "Debug a TheRock-built ROCm 7.13 vLLM image where serving Qwen3.5-0.8B with AITER crashes at startup; fix the root cause and prove AITER works (CK FMHA prefill kernel in the torch profile) and is >=2x faster than the non-AITER path on both TTFT and total throughput (8k in / 1k out)."
keywords = ["rocm", "amd", "mi350", "gfx950", "vllm", "aiter", "therock", "debug", "triage", "flash-attention", "ck", "fmha", "torch-profiler"]
[[task.authors]]
name = "xisun"

[metadata]
author_name = "xisun"
difficulty = "hard"
category = "debug-triage"
tags = ["rocm", "amd", "gfx950", "vllm", "aiter", "therock", "debug"]

[verifier]
# Two full server launches (~2-3 min startup each) + aiter kernel warmup + torch
# profile + two 8k/1k benches → long.
timeout_sec = 3000.0

[agent]
timeout_sec = 5400.0

[environment]
# Image build just copies files onto the (already large) base image.
build_timeout_sec = 2400.0
cpus = 8
memory_mb = 131072
# GPU access comes from environment/docker-compose.yaml (device passthrough +
# GPU-pool allocator), NOT harbor's allocator (which only knows nvidia-docker).
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
