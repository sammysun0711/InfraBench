schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/sglang-sync-stall"
description = "Profile an sglang Qwen3.5-0.8B server on MI350 with the torch profiler and find the host-device (D2H) sync stall that bubbles the GPU compute stream — the per-step .cpu()/.item() copies in the mamba state-tracking (--mamba-scheduler-strategy extra_buffer) path."
keywords = ["rocm", "amd", "mi350", "gfx950", "sglang", "torch-profiler", "profiling", "host-device-sync", "d2h", "gpu-bubble", "mamba", "debug"]
[[task.authors]]
name = "xisun"

[metadata]
author_name = "xisun"
difficulty = "hard"
category = "profiling-analysis"
tags = ["rocm", "amd", "gfx950", "sglang", "profiling", "sync-stall"]

[verifier]
# Verifier launches the server (~1-2 min) + runs the torch profile itself.
timeout_sec = 1800.0

[agent]
timeout_sec = 3600.0

[environment]
# Image build: apply one sed + copy scripts on the (local) sglang base image.
build_timeout_sec = 1800.0
cpus = 8
memory_mb = 65536
# GPU access comes from environment/docker-compose.yaml (device passthrough +
# GPU-pool allocator), NOT harbor's allocator (which only knows nvidia-docker).
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
