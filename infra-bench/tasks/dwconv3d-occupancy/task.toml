schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/dwconv3d-occupancy"
description = "Improve the occupancy of a register-bound BF16 depthwise conv3d HIP kernel on MI350 by restructuring its read/compute schedule (e.g. sched_group_barrier hints) to cut VGPR pressure, reaching >=10% higher throughput while preserving correctness."
keywords = ["rocm", "amd", "mi350", "gfx950", "hip", "occupancy", "vgpr", "register-pressure", "depthwise-conv3d", "rocprofv3", "kernel-tuning"]
[[task.authors]]
name = "xisun"

[metadata]
author_name = "xisun"
difficulty = "hard"
category = "kernel-tuning"
tags = ["rocm", "amd", "gfx950", "hip", "occupancy", "vgpr"]

[verifier]
# Builds + benchmarks the frozen original and the agent kernel; extracts VGPR.
timeout_sec = 1200.0

[agent]
timeout_sec = 3600.0

[environment]
# Image build just copies sources — no compile.
build_timeout_sec = 1800.0
cpus = 8
memory_mb = 32768
# GPU access comes from environment/docker-compose.yaml (device passthrough +
# GPU-pool allocator), NOT harbor's allocator (which only knows nvidia-docker).
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
