schema_version = "1.3"
artifacts = []

[task]
name = "infra-bench/hello-rocm"
description = "GPU visibility smoke test: detect the assigned AMD GPU via PyTorch and report its count, name, and GCN arch. Validates ROCm passthrough and the GPU-pool allocator."
keywords = ["rocm", "amd", "gpu", "smoke-test", "infrastructure"]
[[task.authors]]
name = "xisun"

[metadata]
author_name = "xisun"
difficulty = "easy"
category = "smoke-test"
tags = ["rocm", "amd", "gpu"]

[verifier]
timeout_sec = 600.0

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 1800.0
cpus = 4
memory_mb = 16384
# GPU access is provided by environment/docker-compose.yaml (ROCm device
# passthrough + the GPU-pool allocator), NOT by harbor's allocator. Harbor's
# Docker env only recognizes nvidia-docker and rejects gpus>0, so we leave this
# at 0; the compose file is what actually exposes the MI350.
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]

[solution.env]
